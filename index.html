<!-- ========================= -->
<!-- DICTIONARY VAULT -->
<!-- ========================= -->

<div class="card">

<h2>Dictionary Vault</h2>

<p style="margin-bottom:18px;color:var(--muted)">
All GRE flashcards reviewed during your preparation timeline are stored here automatically for revision and retention tracking.
</p>

<div class="stats">

<div class="stat">
<h2 id="totalWords">0</h2>
<span>Total Words Learned</span>
</div>

<div class="stat">
<h2 id="weakWords">0</h2>
<span>Weak Cards</span>
</div>

<div class="stat">
<h2 id="masteredCards">0</h2>
<span>Mastered Cards</span>
</div>

<div class="stat">
<h2 id="formulaCount">0</h2>
<span>Quant Formulas</span>
</div>

</div>

<!-- Reviewed Vault -->

<div class="task">

<h3 style="margin-bottom:18px">
Reviewed Flashcards
</h3>

<div id="reviewedVault" class="flashcards"></div>

</div>

<!-- Weak Vault -->

<div class="task">

<h3 style="margin-bottom:18px">
Weak Flashcards
</h3>

<div id="weakVault" class="flashcards"></div>

</div>

<!-- Mastered Vault -->

<div class="task">

<h3 style="margin-bottom:18px">
Mastered Flashcards
</h3>

<div id="masteredVault" class="flashcards"></div>

</div>

</div>

<script>

/* ========================= */
/* STORAGE */
/* ========================= */

let reviewed = JSON.parse(localStorage.getItem('reviewed')) || [];

let mastered = JSON.parse(localStorage.getItem('mastered')) || [];

let weak = JSON.parse(localStorage.getItem('weak')) || [];

/* ========================= */
/* MARK CARD */
/* ========================= */

function markCard(level,name){

if(!reviewed.includes(name)){
reviewed.push(name);
}

if(level === 'easy' && !mastered.includes(name)){
mastered.push(name);
}

if(level === 'hard' && !weak.includes(name)){
weak.push(name);
}

localStorage.setItem('reviewed',JSON.stringify(reviewed));

localStorage.setItem('mastered',JSON.stringify(mastered));

localStorage.setItem('weak',JSON.stringify(weak));

updateAnalytics();

renderVaults();

}

/* ========================= */
/* ANALYTICS */
/* ========================= */

function updateAnalytics(){

document.getElementById('totalWords').innerHTML =
reviewed.length;

document.getElementById('weakWords').innerHTML =
weak.length;

document.getElementById('masteredCards').innerHTML =
mastered.length;

document.getElementById('formulaCount').innerHTML =
quantFlashcards.length;

}

/* ========================= */
/* RENDER VAULTS */
/* ========================= */

function renderVaults(){

const reviewedVault =
document.getElementById('reviewedVault');

const weakVault =
document.getElementById('weakVault');

const masteredVault =
document.getElementById('masteredVault');

/* ========================= */
/* REVIEWED */
/* ========================= */

reviewedVault.innerHTML = '';

reviewed.forEach(card=>{

reviewedVault.innerHTML += `

<div class="flashcard">

<div class="flash-inner">

<div class="flash-front">

<h3>${card}</h3>

<p>
Reviewed Card
</p>

</div>

<div class="flash-back">

<p>
Previously reviewed GRE flashcard.
</p>

</div>

</div>

</div>

`;

});

/* ========================= */
/* WEAK */
/* ========================= */

weakVault.innerHTML = '';

weak.forEach(card=>{

weakVault.innerHTML += `

<div class="flashcard">

<div class="flash-inner">

<div class="flash-front">

<h3>${card}</h3>

<p>
Weak Card
</p>

</div>

<div class="flash-back">

<p>
Needs additional revision.
</p>

</div>

</div>

</div>

`;

});

/* ========================= */
/* MASTERED */
/* ========================= */

masteredVault.innerHTML = '';

mastered.forEach(card=>{

masteredVault.innerHTML += `

<div class="flashcard">

<div class="flash-inner">

<div class="flash-front">

<h3>${card}</h3>

<p>
Mastered Card
</p>

</div>

<div class="flash-back">

<p>
Strong retention achieved.
</p>

</div>

</div>

</div>

`;

});

/* ========================= */
/* ENABLE FLIP */
/* ========================= */

document.querySelectorAll('.flashcard')
.forEach(card=>{

card.addEventListener('click',()=>{

card.classList.toggle('flipped');

});

});

}

/* ========================= */
/* INITIALIZE */
/* ========================= */

updateAnalytics();

renderVaults();

</script>
